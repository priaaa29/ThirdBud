<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>ThirdBud — Sync Music With Friends</title>
  <meta name="theme-color" content="#0a0a0f"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100vh;min-height:100dvh}
    body{background:#0a0a0f;color:#eee;font-family:'Outfit',sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    .dm{font-family:'DM Sans',sans-serif}
    input::placeholder{color:#555}input:focus{outline:none}
    button{font-family:'Outfit',sans-serif}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-180px) scale(1.4)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes fadePulse{0%,100%{opacity:.5}50%{opacity:1}}
    .btn-press{transition:transform .12s}.btn-press:active{transform:scale(.95)!important}
    @media(hover:hover){.trk:hover{background:rgba(255,255,255,.05)!important}}
  </style>
</head>
<body><div id="app"></div></body>
</html>
